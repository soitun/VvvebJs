<div id="top-panel">

	<div class="btn-group float-start" role="group">
		<button class="btn px-2 menu-toggle" title="Toggle sidebar width" data-vvveb-action="toggleSidebar">
			<i class="la la-bars"></i>
		</button>

		<button class="btn btn-light px-1" title="Toggle file manager" id="toggle-file-manager-btn"
			data-vvveb-action="toggleFileManager" data-bs-toggle="button" aria-pressed="false">
			<img src="libs/builder/icons/file-manager-layout.svg" width="12" height="12" alt="" role="presentation">
		</button>

		<button class="btn btn-light px-1" title="Toggle left column" id="toggle-left-column-btn"
			data-vvveb-action="toggleLeftColumn" data-bs-toggle="button" aria-pressed="false">
			<img src="libs/builder/icons/left-column-layout.svg" width="12" height="12" alt="" role="presentation">
		</button>

		<button class="btn btn-light px-1" title="Toggle right column" id="toggle-right-column-btn"
			data-vvveb-action="toggleRightColumn" data-bs-toggle="button" aria-pressed="false">
			<img src="libs/builder/icons/right-column-layout.svg" width="12" height="12" alt="" role="presentation">
		</button>
	</div>


	<div>
		<div class="btn-group me-3" role="group">
			<button class="btn btn-light" title="Undo (Ctrl/Cmd + Z)" id="undo-btn" data-vvveb-action="undo"
				data-vvveb-shortcut="ctrl+z">
				<i class="la la-undo"></i>
			</button>

			<button class="btn btn-light" title="Redo (Ctrl/Cmd + Shift + Y)" id="redo-btn" data-vvveb-action="redo"
				data-vvveb-shortcut="ctrl+shift+z">
				<i class="la la-undo la-flip-horizontal"></i>
			</button>
		</div>


		<div class="btn-group me-3" role="group">
			<button class="btn btn-light" title="Designer Mode (Free dragging)" id="designer-mode-btn"
				data-bs-toggle="button" aria-pressed="false" data-vvveb-action="setDesignerMode">
				<i class="la la-hand-rock"></i>
			</button>

			<button class="btn btn-light" title="Preview" id="preview-btn" type="button" data-bs-toggle="button"
				aria-pressed="false" data-vvveb-action="preview">
				<i class="icon-eye-outline"></i>
			</button>

			<button class="btn btn-light" title="Fullscreen (F11)" id="fullscreen-btn" data-bs-toggle="button"
				aria-pressed="false" data-vvveb-action="fullscreen">
				<i class="icon-expand-outline"></i>
			</button>

			<button class="btn btn-light" title="Show hidden elements" id="toggle-hidden" data-bs-toggle="button"
				data-vvveb-action="toggleHidden" aria-pressed="false">
				<i class="icon-scan-outline"></i>
			</button>

			<button class="btn btn-light active" title="Toggle navigator (Ctrl + Shift + L)" id="toggle-tree-list"
				data-bs-toggle="button" data-vvveb-action="toggleTreeList" aria-pressed="true">
				<i class="icon-layers-outline"></i>
			</button>

			<button class="btn btn-light" title="Download" id="download-btn" data-vvveb-action="download"
				data-v-download="index.html">
				<i class="la la-download"></i>
			</button>
		</div>
	</div>


	<div class="btn-group">

		<div class="me-2">

			<button class="btn btn-light btn-dark-mode" data-vvveb-action="darkMode">
				<!-- i class="la la-adjust la-lg"></i -->
				<i class="la la-sun"></i>
			</button>

			<a href="#" class="btn btn-light px-1 btn-preview-url" target="_blank" title="View page">
				<i class="la la-external-link-alt"></i>
			</a>

			<div class="btn-group responsive-btns" role="group">

				<button type="button" class="btn btn-light btn-sm px-1 me-1" data-bs-toggle="dropdown"
					aria-expanded="false" title="Breakpoints">
					<i class="la la-mobile"></i>
				</button>

				<div class="dropdown-menu">

					<button id="mobile-view" data-view="sm" class="btn btn-light w-100" title="Mobile"
						data-vvveb-action="viewport">
						<i class="la la-mobile"></i>
						<span>Mobile view</span>
					</button>

					<button id="tablet-view" data-view="md" class="btn btn-light w-100" title="Tablet"
						data-vvveb-action="viewport">
						<i class="la la-tablet la-rotate-90"></i>
						<span>Tablet view</span>
					</button>

					<button id="tablet-landscape-view" data-view="lg" class="btn btn-light w-100"
						title="Tablet landscape" data-vvveb-action="viewport">
						<i class="la la-tablet"></i>
						<span>Tablet landscape view</span>
					</button>

					<button id="laptop-view" data-view="xl" class="btn btn-light w-100" title="Laptop"
						data-vvveb-action="viewport">
						<i class="la la-laptop"></i>
						<span>Laptop view</span>
					</button>

					<button id="desktop-view" data-view="xxl" class="btn btn-light w-100" title="Desktop"
						data-vvveb-action="viewport">
						<i class="la la-desktop"></i>
						<span>Desktop view</span>
					</button>

				</div>

				<div class="percent">
					<input type="number" id="zoom" value="100" step="10" min="10" max="100" class="form-control"
						data-vvveb-action="zoomChange" data-vvveb-on="change">
				</div>
			</div>

		</div>


		<div class="btn-group me-2" role="group">

			<div class="btn-group">
				<button class="btn btn-primary btn-icon btn-sm save-btn" title="Save changes (Ctrl + S)"
					data-vvveb-action="save" data-vvveb-url="save.php" data-v-vvveb-shortcut="ctrl+s" disabled>
					<span class="loading d-none">

						<!-- i class="la la-save"></i -->
						<span class="spinner-border spinner-border-sm align-middle" role="status"
							aria-hidden="true"></span>
						<span>Saving </span> ...
					</span>

					<span class="button-text">
						<!-- i class="icon-save-outline"></i -->
						<span>Save</span>
					</span>
				</button>
				<button type="button" class="btn btn-icon btn-primary btn-sm save-btn dropdown-toggle dropdown-toggle-split text-white" 
					id="showChangesBtn" 
					data-vvveb-action="showChanges"
					data-bs-toggle="offcanvas" 
					aria-expanded="false" 
					data-bs-target="#save-offcanvas" 
					aria-controls="save-offcanvas"
					data-bs-reference="parent"
					disabled>
					
				  <span class="visually-hidden">Toggle primary</span>
				</button>
			</div>
		</div>
	</div>
</div>
